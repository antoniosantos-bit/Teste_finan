<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanças Color Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; padding-bottom: 100px; }
        .card-bank { transition: all 0.3s ease; border-left: 6px solid transparent; }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        .dot { height: 12px; width: 12px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex flex-col justify-center px-8 space-y-6">
        <div class="text-center">
            <h1 class="text-4xl font-black text-indigo-600 tracking-tighter">FINANÇAS<br>COLOR PRO</h1>
        </div>
        <input id="user-name" type="text" placeholder="Nome do Perfil" class="w-full p-5 rounded-2xl ring-1 ring-gray-200 outline-none focus:ring-2 focus:ring-indigo-600 bg-white shadow-sm">
        <button onclick="fazerLogin()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold shadow-xl">Acessar</button>
    </div>

    <div id="main-app" class="hidden animate-in fade-in duration-500">
        <nav class="flex justify-around bg-white border-b sticky top-0 z-50">
            <button onclick="mudarAba('resumo')" id="btn-resumo" class="p-4 font-bold text-[10px] uppercase tracking-widest tab-active">Início</button>
            <button onclick="mudarAba('bancos')" id="btn-bancos" class="p-4 font-bold text-[10px] uppercase tracking-widest text-gray-400">Bancos</button>
            <button onclick="mudarAba('metas')" id="btn-metas" class="p-4 font-bold text-[10px] uppercase tracking-widest text-gray-400">Cofres</button>
        </nav>

        <section id="aba-resumo" class="p-6 space-y-6">
            <div class="bg-slate-900 p-8 rounded-[32px] text-white shadow-2xl">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Saldo Total Combinado</p>
                <h2 id="saldo-geral" class="text-4xl font-black mt-1">R$ 0,00</h2>
            </div>

            <div class="space-y-4">
                <h3 class="font-extrabold text-gray-800 flex justify-between items-center">
                    Atividade Recente
                    <button onclick="exportarDados()" class="text-[9px] bg-gray-200 px-2 py-1 rounded">Backup</button>
                </h3>
                <div id="movimentacoes" class="space-y-3"></div>
            </div>
        </section>

        <section id="aba-bancos" class="hidden p-6 space-y-4">
            <h3 class="font-extrabold text-gray-800">Minhas Contas</h3>
            <div id="lista-bancos" class="space-y-3"></div>
            
            <div class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 space-y-3">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Novo Banco / Cartão</p>
                <input id="nome-banco" type="text" placeholder="Nome (Ex: Nubank)" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <input id="saldo-inicial" type="number" placeholder="Saldo Atual (R$)" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                
                <p class="text-[10px] font-bold text-gray-400 uppercase mt-2">Escolha a Cor</p>
                <div class="flex justify-between gap-2">
                    <input type="color" id="cor-banco" value="#4f46e5" class="w-full h-10 rounded-lg cursor-pointer bg-transparent border-0">
                </div>

                <button onclick="adicionarBanco()" class="w-full bg-gray-900 text-white p-4 rounded-xl font-bold text-sm">Criar Conta</button>
            </div>
        </section>

        <section id="aba-metas" class="hidden p-6 space-y-4">
            <h3 class="font-extrabold text-gray-800">Cofres</h3>
            <div id="lista-metas" class="space-y-4"></div>
            <div class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 space-y-3">
                <input id="nome-meta" type="text" placeholder="Nome do Objetivo" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <input id="valor-meta" type="number" placeholder="Valor Alvo (R$)" class="w-full p-3 bg-gray-50 rounded-xl outline-none">
                <button onclick="adicionarMeta()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">Criar Cofre</button>
            </div>
        </section>

        <button onclick="abrirModal()" class="fixed bottom-8 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full text-3xl shadow-2xl flex items-center justify-center z-50 active:scale-90 transition-all">
            +
        </button>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/60 hidden z-[60] flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-8 space-y-4 animate-in slide-in-from-bottom duration-300">
            <h3 class="text-xl font-black text-center">Registrar Valor</h3>
            <input id="m-desc" type="text" placeholder="Descrição" class="w-full p-4 bg-gray-50 rounded-2xl outline-none">
            <input id="m-valor" type="number" inputmode="decimal" placeholder="R$ 0,00" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold text-indigo-600">
            
            <div class="grid grid-cols-2 gap-3">
                <select id="m-tipo" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-gray-600">
                    <option value="despesa">➖ Gasto</option>
                    <option value="receita">➕ Ganhei</option>
                </select>
                <select id="m-banco" class="p-4 bg-gray-50 rounded-2xl outline-none font-bold text-gray-600">
                </select>
            </div>
            
            <button onclick="confirmarLancamento()" class="w-full bg-indigo-600 text-white p-5 rounded-2xl font-bold shadow-lg">Confirmar</button>
            <button onclick="fecharModal()" class="w-full text-gray-400 font-bold">Voltar</button>
        </div>
    </div>

    <script>
        let u = "";
        let db = JSON.parse(localStorage.getItem('financas_color_v8')) || {};

        function mudarAba(aba) {
            ['resumo', 'bancos', 'metas'].forEach(a => {
                document.getElementById('aba-'+a).classList.add('hidden');
                document.getElementById('btn-'+a).classList.remove('tab-active');
                document.getElementById('btn-'+a).classList.add('text-gray-400');
            });
            document.getElementById('aba-'+aba).classList.remove('hidden');
            document.getElementById('btn-'+aba).classList.add('tab-active');
            render();
        }

        function fazerLogin() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return;
            u = name.toLowerCase();
            if (!db[u]) db[u] = { bancos: [], historico: [], metas: [] };
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            render();
        }

        function adicionarBanco() {
            const nome = document.getElementById('nome-banco').value;
            const saldo = parseFloat(document.getElementById('saldo-inicial').value);
            const cor = document.getElementById('cor-banco').value;
            if(!nome || isNaN(saldo)) return;
            db[u].bancos.push({ nome, saldo, cor });
            salvar();
            document.getElementById('nome-banco').value = ""; document.getElementById('saldo-inicial').value = "";
        }

        function adicionarMeta() {
            const nome = document.getElementById('nome-meta').value;
            const valor = parseFloat(document.getElementById('valor-meta').value);
            if(!nome || isNaN(valor)) return;
            db[u].metas.push({ nome, total: valor, atual: 0 });
            salvar();
            document.getElementById('nome-meta').value = ""; document.getElementById('valor-meta').value = "";
        }

        function abrirModal() {
            if(db[u].bancos.length === 0) return alert("Cadastre um banco primeiro na aba Bancos!");
            const select = document.getElementById('m-banco');
            select.innerHTML = db[u].bancos.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal').classList.add('hidden'); }

        function confirmarLancamento() {
            const desc = document.getElementById('m-desc').value;
            const valor = parseFloat(document.getElementById('m-valor').value);
            const tipo = document.getElementById('m-tipo').value;
            const bancoNome = document.getElementById('m-banco').value;

            if(!desc || isNaN(valor)) return;

            const banco = db[u].bancos.find(b => b.nome === bancoNome);
            if (tipo === 'receita') banco.saldo += valor;
            else banco.saldo -= valor;

            db[u].historico.unshift({ desc, valor, tipo, banco: bancoNome, cor: banco.cor, data: new Date().toLocaleDateString('pt-BR') });
            fecharModal();
            salvar();
        }

        function salvar() {
            localStorage.setItem('financas_color_v8', JSON.stringify(db));
            render();
        }

        function render() {
            const user = db[u];
            
            const totalGeral = user.bancos.reduce((acc, b) => acc + b.saldo, 0);
            document.getElementById('saldo-geral').innerText = `R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            const listaB = document.getElementById('lista-bancos');
            listaB.innerHTML = user.bancos.map(b => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-8 flex justify-between items-center" style="border-color: ${b.cor}">
                    <div>
                        <p class="font-black text-gray-800 text-lg">${b.nome}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Saldo em Conta</p>
                    </div>
                    <span class="font-black text-lg ${b.saldo < 0 ? 'text-red-500' : 'text-gray-900'}">R$ ${b.saldo.toFixed(2)}</span>
                </div>
            `).join('');

            const listaH = document.getElementById('movimentacoes');
            listaH.innerHTML = user.historico.slice(0, 15).map(h => `
                <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-50">
                    <div class="flex items-center gap-3">
                        <span class="dot" style="background-color: ${h.cor}"></span>
                        <div>
                            <p class="text-sm font-bold text-gray-800">${h.desc}</p>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${h.data} • ${h.banco}</p>
                        </div>
                    </div>
                    <span class="font-black ${h.tipo === 'receita' ? 'text-green-500' : 'text-gray-900'}">${h.tipo === 'receita' ? '+' : '-'} R$ ${h.valor.toFixed(2)}</span>
                </div>
            `).join('');

            const listaM = document.getElementById('lista-metas');
            listaM.innerHTML = user.metas.map(m => {
                const perc = Math.min(100, (m.atual / m.total) * 100);
                return `
                    <div class="bg-white p-5 rounded-2xl shadow-sm space-y-2">
                        <div class="flex justify-between font-bold text-xs uppercase tracking-tighter"><span>${m.nome}</span><span>${perc.toFixed(0)}%</span></div>
                        <div class="h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full bg-indigo-600" style="width: ${perc}%"></div></div>
                        <p class="text-[9px] text-gray-400 font-bold">R$ ${m.atual.toFixed(2)} / R$ ${m.total.toFixed(2)}</p>
                    </div>
                `;
            }).join('');
        }

        function exportarDados() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "meu_backup_financas.json");
            dlAnchorElem.click();
        }
    </script>
</body>
</html>
