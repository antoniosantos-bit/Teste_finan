<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guima Strategy | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; padding-bottom: 120px; }
        .tab-active { color: #4f46e5; border-bottom: 3px solid #4f46e5; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        input, select { font-size: 16px !important; }
        .animate-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex flex-col justify-center px-8 bg-white">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-slate-900 rounded-[28px] flex items-center justify-center mx-auto shadow-2xl mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h1 class="text-3xl font-black text-slate-900 tracking-tighter uppercase">Guima Strategy</h1>
            <p class="text-slate-400 text-sm font-medium uppercase tracking-widest">Master Edition v10</p>
        </div>
        <div class="space-y-4">
            <input id="user-name" type="text" placeholder="Nome de Acesso" class="w-full p-5 rounded-2xl bg-slate-50 border-0 ring-1 ring-slate-200 outline-none focus:ring-2 focus:ring-slate-900 transition-all">
            <button onclick="fazerLogin()" class="w-full bg-slate-900 text-white p-5 rounded-2xl font-bold shadow-xl active:scale-95 transition-transform">Entrar no Painel</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="flex justify-around bg-white border-b sticky top-0 z-50 shadow-sm">
            <button onclick="mudarAba('resumo')" id="btn-resumo" class="p-4 font-bold text-[10px] uppercase tracking-widest tab-active">Fluxo</button>
            <button onclick="mudarAba('bancos')" id="btn-bancos" class="p-4 font-bold text-[10px] uppercase tracking-widest text-gray-400">Contas</button>
            <button onclick="mudarAba('metas')" id="btn-metas" class="p-4 font-bold text-[10px] uppercase tracking-widest text-gray-400">Cofres</button>
        </nav>

        <section id="aba-resumo" class="p-6 space-y-6 animate-up">
            <div class="bg-slate-900 p-8 rounded-[32px] text-white shadow-2xl relative overflow-hidden">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Patrimônio Líquido</p>
                <h2 id="saldo-geral" class="text-4xl font-black mt-1">R$ 0,00</h2>
                <div class="absolute -right-4 -top-4 w-20 h-20 bg-white/5 rounded-full"></div>
            </div>
            <div class="space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="font-extrabold text-gray-800 tracking-tight">Atividade Geral</h3>
                    <button onclick="exportarDados()" class="text-[9px] bg-gray-100 text-gray-400 font-black px-3 py-1 rounded-full uppercase italic">Backup</button>
                </div>
                <div id="movimentacoes" class="space-y-3"></div>
            </div>
        </section>

        <section id="aba-bancos" class="hidden p-6 space-y-4 animate-up">
            <h3 class="font-extrabold text-gray-800">Suas Instituições</h3>
            <div id="lista-bancos" class="space-y-3"></div>
            <div class="bg-white p-6 rounded-[28px] border border-gray-100 space-y-3 mt-6">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nova Instituição</p>
                <input id="nome-banco" type="text" placeholder="Nome (Ex: Nubank, Itaú)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-0 ring-1 ring-gray-100">
                <input id="saldo-inicial" type="number" inputmode="decimal" placeholder="Saldo Inicial R$" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-0 ring-1 ring-gray-100">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Cor:</span>
                    <input type="color" id="cor-banco" value="#0f172a" class="w-12 h-10 rounded-lg cursor-pointer bg-transparent border-0">
                </div>
                <button onclick="adicionarBanco()" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold shadow-lg">Cadastrar Conta</button>
            </div>
        </section>

        <section id="aba-metas" class="hidden p-6 space-y-4 animate-up">
            <h3 class="font-extrabold text-gray-800 tracking-tight">Meus Cofres Estratégicos</h3>
            <div id="lista-metas" class="space-y-6"></div>
            
            <div class="bg-white p-6 rounded-[28px] border border-gray-100 space-y-3 mt-8 shadow-sm">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Definir Novo Alvo</p>
                <input id="nome-meta" type="text" placeholder="Objetivo (Ex: Carro, Viagem)" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-0 ring-1 ring-gray-100">
                <input id="valor-meta" type="number" inputmode="decimal" placeholder="Valor do Alvo R$" class="w-full p-4 bg-gray-50 rounded-2xl outline-none border-0 ring-1 ring-gray-100">
                <button onclick="adicionarMeta()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-indigo-100 shadow-xl">Iniciar Plano</button>
            </div>
        </section>

        <button onclick="abrirModal()" class="fixed bottom-8 right-6 w-16 h-16 bg-slate-900 text-white rounded-[22px] shadow-2xl flex items-center justify-center z-50 active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
        </button>
    </div>

    <div id="modal-cofre" class="fixed inset-0 bg-black/70 hidden z-[70] flex items-end backdrop-blur-sm">
        <div class="bg-white w-full rounded-t-[40px] p-8 pb-12 space-y-4 animate-in slide-in-from-bottom duration-300 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-100 rounded-full mx-auto mb-4"></div>
            <h3 id="titulo-modal-cofre" class="text-xl font-black text-center text-slate-800 uppercase italic">Aportar no Cofre</h3>
            
            <input id="v-cofre" type="number" inputmode="decimal" placeholder="R$ 0,00" class="w-full p-6 bg-gray-50 rounded-[24px] outline-none font-black text-3xl text-indigo-600 text-center border-0 ring-1 ring-gray-100">
            
            <div class="space-y-2">
                <p class="text-[10px] font-bold text-center text-gray-400 uppercase tracking-widest">Origem do Recurso</p>
                <select id="banco-origem-cofre" class="w-full p-5 bg-gray-50 rounded-[22px] outline-none font-bold text-gray-600 border-0 ring-1 ring-gray-100"></select>
            </div>
            
            <button onclick="processarAporte()" class="w-full bg-indigo-600 text-white p-5 rounded-[22px] font-extrabold text-lg shadow-xl shadow-indigo-100">Confirmar Aporte</button>
            <button onclick="fecharModalCofre()" class="w-full text-gray-400 font-bold p-2 text-sm uppercase">Cancelar</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/70 hidden z-[60] flex items-end backdrop-blur-sm">
        <div class="bg-white w-full rounded-t-[40px] p-8 pb-12 space-y-4 animate-in slide-in-from-bottom duration-300">
            <div class="w-12 h-1.5 bg-gray-100 rounded-full mx-auto mb-4"></div>
            <h3 class="text-xl font-black text-center text-slate-800 uppercase">Nova Movimentação</h3>
            
            <input id="m-desc" type="text" placeholder="O que foi feito?" class="w-full p-5 bg-gray-50 rounded-[22px] outline-none border-0 ring-1 ring-gray-100 font-bold">
            <input id="m-valor" type="number" inputmode="decimal" placeholder="R$ 0,00" class="w-full p-5 bg-gray-50 rounded-[22px] outline-none font-black text-indigo-600 text-2xl border-0 ring-1 ring-gray-100">
            
            <div class="grid grid-cols-2 gap-3">
                <select id="m-tipo" class="p-5 bg-gray-50 rounded-[22px] outline-none font-bold text-gray-500 border-0 ring-1 ring-gray-100">
                    <option value="despesa">➖ Saída</option>
                    <option value="receita">➕ Entrada</option>
                </select>
                <select id="m-banco" class="p-5 bg-gray-50 rounded-[22px] outline-none font-bold text-gray-500 border-0 ring-1 ring-gray-100">
                    </select>
            </div>
            
            <button onclick="confirmarLancamento()" class="w-full bg-slate-900 text-white p-5 rounded-[22px] font-black text-lg shadow-2xl">Processar Operação</button>
            <button onclick="fecharModal()" class="w-full text-gray-400 font-bold p-2 text-sm uppercase">Cancelar</button>
        </div>
    </div>

    <script>
        let u = "";
        let db = JSON.parse(localStorage.getItem('guima_master_v10')) || {};
        let cofreSelecionado = null;

        function mudarAba(aba) {
            ['resumo', 'bancos', 'metas'].forEach(a => {
                document.getElementById('aba-'+a).classList.add('hidden');
                document.getElementById('btn-'+a).classList.remove('tab-active');
                document.getElementById('btn-'+a).classList.add('text-gray-400');
            });
            document.getElementById('aba-'+aba).classList.remove('hidden');
            document.getElementById('btn-'+aba).classList.add('tab-active');
            render();
        }

        function fazerLogin() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return;
            u = name.toLowerCase();
            if (!db[u]) db[u] = { bancos: [], historico: [], metas: [] };
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            render();
        }

        function adicionarBanco() {
            const nome = document.getElementById('nome-banco').value;
            const saldo = parseFloat(document.getElementById('saldo-inicial').value);
            const cor = document.getElementById('cor-banco').value;
            if(!nome || isNaN(saldo)) return;
            db[u].bancos.push({ nome, saldo, cor });
            salvar();
            document.getElementById('nome-banco').value = ""; document.getElementById('saldo-inicial').value = "";
        }

        function adicionarMeta() {
            const nome = document.getElementById('nome-meta').value;
            const valor = parseFloat(document.getElementById('valor-meta').value);
            if(!nome || isNaN(valor)) return;
            // Iniciamos agora com um array 'extrato' vazio
            db[u].metas.push({ id: Date.now(), nome, total: valor, atual: 0, extrato: [] });
            salvar();
            document.getElementById('nome-meta').value = ""; document.getElementById('valor-meta').value = "";
        }

        function abrirModalCofre(id) {
            cofreSelecionado = db[u].metas.find(m => m.id === id);
            document.getElementById('titulo-modal-cofre').innerText = `Cofre: ${cofreSelecionado.nome}`;
            const select = document.getElementById('banco-origem-cofre');
            select.innerHTML = db[u].bancos.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('modal-cofre').classList.remove('hidden');
        }

        function fecharModalCofre() { document.getElementById('modal-cofre').classList.add('hidden'); }

        function processarAporte() {
            const valor = parseFloat(document.getElementById('v-cofre').value);
            const bancoNome = document.getElementById('banco-origem-cofre').value;
            if (isNaN(valor) || valor <= 0) return;

            const banco = db[u].bancos.find(b => b.nome === bancoNome);
            if (banco.saldo < valor) { alert("Saldo insuficiente neste banco!"); return; }

            const dataHoje = new Date().toLocaleDateString('pt-BR');

            // 1. Abate do Banco
            banco.saldo -= valor;
            
            // 2. Soma no Cofre e registra no Extrato do Cofre
            cofreSelecionado.atual += valor;
            if(!cofreSelecionado.extrato) cofreSelecionado.extrato = []; // Garantia para saves antigos
            cofreSelecionado.extrato.unshift({ valor, banco: bancoNome, data: dataHoje });

            // 3. Registra no Histórico Geral
            db[u].historico.unshift({ desc: `Aporte: ${cofreSelecionado.nome}`, valor, tipo: 'despesa', banco: bancoNome, cor: '#4f46e5', data: dataHoje });
            
            document.getElementById('v-cofre').value = "";
            fecharModalCofre();
            salvar();
        }

        function abrirModal() {
            if(db[u].bancos.length === 0) return alert("Cadastre uma conta primeiro!");
            const select = document.getElementById('m-banco');
            select.innerHTML = db[u].bancos.map(b => `<option value="${b.nome}">${b.nome}</option>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('modal').classList.add('hidden'); }

        function confirmarLancamento() {
            const desc = document.getElementById('m-desc').value;
            const valor = parseFloat(document.getElementById('m-valor').value);
            const tipo = document.getElementById('m-tipo').value;
            const bancoNome = document.getElementById('m-banco').value;
            if(!desc || isNaN(valor)) return;
            const banco = db[u].bancos.find(b => b.nome === bancoNome);
            if (tipo === 'receita') banco.saldo += valor; else banco.saldo -= valor;
            db[u].historico.unshift({ desc, valor, tipo, banco: bancoNome, cor: banco.cor, data: new Date().toLocaleDateString('pt-BR') });
            fecharModal();
            salvar();
        }

        function salvar() { localStorage.setItem('guima_master_v10', JSON.stringify(db)); render(); }

        function render() {
            const user = db[u];
            if(!user) return;
            
            const totalGeral = user.bancos.reduce((acc, b) => acc + b.saldo, 0);
            document.getElementById('saldo-geral').innerText = `R$ ${totalGeral.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;

            const listaB = document.getElementById('lista-bancos');
            listaB.innerHTML = user.bancos.map(b => `
                <div class="bg-white p-5 rounded-[24px] shadow-sm border-l-[6px] flex justify-between items-center" style="border-color: ${b.cor}">
                    <div><p class="font-extrabold text-slate-800 text-lg leading-tight">${b.nome}</p><p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-1">Disponível</p></div>
                    <span class="font-black text-xl ${b.saldo < 0 ? 'text-red-500' : 'text-slate-900'}">R$ ${b.saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div>
            `).join('');

            const listaH = document.getElementById('movimentacoes');
            listaH.innerHTML = user.historico.length === 0 ? '<div class="text-center py-10 text-gray-300 font-bold uppercase text-[10px]">Sem atividade</div>' : 
            user.historico.slice(0, 15).map(h => `
                <div class="bg-white p-4 rounded-[20px] shadow-sm flex justify-between items-center border border-gray-50">
                    <div class="flex items-center gap-3"><span class="dot" style="background-color: ${h.cor}"></span>
                    <div><p class="text-sm font-extrabold text-slate-800 leading-none">${h.desc}</p><p class="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-tighter">${h.data} • ${h.banco}</p></div></div>
                    <span class="font-black ${h.tipo === 'receita' ? 'text-green-500' : 'text-slate-900'}">R$ ${h.valor.toFixed(2)}</span>
                </div>
            `).join('');

            const listaM = document.getElementById('lista-metas');
            listaM.innerHTML = user.metas.map(m => {
                const perc = Math.min(100, (m.atual / m.total) * 100);
                const extratoHTML = (m.extrato || []).slice(0, 3).map(ex => `
                    <div class="flex justify-between text-[9px] font-bold text-slate-400 border-t border-gray-50 pt-2 mt-2">
                        <span>${ex.data} - ${ex.banco}</span>
                        <span class="text-indigo-600">+ R$ ${ex.valor.toFixed(2)}</span>
                    </div>
                `).join('');

                return `
                    <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-50 space-y-4">
                        <div class="flex justify-between font-black text-[11px] uppercase text-slate-700 tracking-tighter"><span>${m.nome}</span><span class="text-indigo-600">${perc.toFixed(1)}%</span></div>
                        <div class="h-3 bg-gray-50 rounded-full overflow-hidden border border-gray-100">
                            <div class="h-full bg-indigo-600 transition-all duration-1000" style="width: ${perc}%"></div>
                        </div>
                        <div class="flex justify-between items-center">
                            <p class="text-[10px] text-slate-400 font-black tracking-widest uppercase">R$ ${m.atual.toLocaleString('pt-BR')} / R$ ${m.total.toLocaleString('pt-BR')}</p>
                            <button onclick="abrirModalCofre(${m.id})" class="bg-indigo-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-indigo-100 active:scale-95 transition-all tracking-widest">Aportar</button>
                        </div>
                        <div class="mt-2">
                            <p class="text-[8px] font-black text-gray-300 uppercase mb-2 tracking-widest">Últimos Depósitos:</p>
                            ${extratoHTML || '<p class="text-[9px] text-gray-300 italic">Nenhum aporte realizado</p>'}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function exportarDados() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "guima_master_v10_backup.json");
            dlAnchorElem.click();
        }
    </script>
</body>
</html>
