<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guima Strategy | Master v25</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* BASE E TIPOGRAFIA */
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            padding-bottom: 110px; 
            letter-spacing: -0.01em; 
        }
        
        /* CARDS PREMIUM OLED */
        .premium-card { 
            background: linear-gradient(145deg, #0a0a0a 0%, #111111 100%); 
            border: 1px solid #1a1a1a; 
            border-radius: 28px; 
            position: relative; 
        }
        
        /* CORES DE FLUXO E FEEDBACK */
        .text-entrada { 
            color: #10b981; 
        } 
        
        .text-saida { 
            color: #ef4444; 
        }   
        
        /* MENU DE NAVEGAÇÃO */
        .tab-active { 
            color: #ffffff !important; 
            font-weight: 800; 
        }
        
        .tab-active::after { 
            content: ''; 
            position: absolute; 
            bottom: 8px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 4px; 
            height: 4px; 
            background: #ffffff; 
            border-radius: 50%; 
        }

        /* MODO PRIVACIDADE */
        .hide-val { 
            filter: blur(15px); 
            pointer-events: none; 
            opacity: 0.3; 
        }

        /* ANIMAÇÃO DO COFRE E BONECO */
        .runner { 
            position: absolute; 
            top: -30px; 
            transition: left 0.8s cubic-bezier(0.23, 1, 0.32, 1); 
            font-size: 24px; 
            transform: scaleX(-1); 
            z-index: 20; 
        }
        
        .progress-track { 
            height: 6px; 
            background: #141414; 
            border-radius: 100px; 
            position: relative; 
            margin-top: 45px; 
        }
        
        .progress-bar-fintech { 
            height: 100%; 
            border-radius: 100px; 
            transition: width 1s; 
            background-color: #ffffff; 
        }

        /* ANIMAÇÕES DE TELA */
        section { 
            display: none; 
            animation: slideUp 0.4s ease; 
        }
        
        @keyframes slideUp { 
            from { 
                opacity: 0; 
                transform: translateY(15px); 
            } 
            to { 
                opacity: 1; 
                transform: translateY(0); 
            } 
        }

        /* ESTILO DOS CAMPOS DE TEXTO E SELEÇÃO */
        input, select { 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            color: #ffffff; 
            outline: none; 
            transition: all 0.3s ease;
        }
        
        /* ETIQUETAS E BOTÕES */
        .bg-parcela { 
            background: #1e1b4b; 
            color: #818cf8; 
            padding: 2px 6px; 
            border-radius: 6px; 
            font-size: 8px; 
            font-weight: 800; 
        }
        
        .btn-action { 
            background: rgba(255,255,255,0.05); 
            padding: 8px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex flex-col justify-center px-10 bg-black z-[100] relative text-center">
        <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-2xl">
            <span class="text-black text-4xl font-black italic">G</span>
        </div>
        
        <h1 class="text-3xl font-extrabold uppercase italic">Guima Strategy</h1>
        
        <div class="mt-12 space-y-4">
            <input id="user-name" type="text" placeholder="ID DE ACESSO" class="w-full p-5 rounded-2xl text-center font-bold">
            <button onclick="fazerLogin()" class="w-full bg-white text-black p-5 rounded-2xl font-black uppercase active:scale-95 transition-all">Acessar</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        
        <nav class="flex justify-around bg-black/80 backdrop-blur-xl border-b border-zinc-900 sticky top-0 z-[50]">
            <button onclick="mudarAba('resumo')" id="btn-resumo" class="p-6 text-[10px] font-bold uppercase text-zinc-600 tab-active">Fluxo</button>
            <button onclick="mudarAba('insights')" id="btn-insights" class="p-6 text-[10px] font-bold uppercase text-zinc-600">Estratégia</button>
            <button onclick="mudarAba('bancos')" id="btn-bancos" class="p-6 text-[10px] font-bold uppercase text-zinc-600">Contas</button>
            <button onclick="mudarAba('metas')" id="btn-metas" class="p-6 text-[10px] font-bold uppercase text-zinc-600">Cofres</button>
        </nav>

        <section id="aba-resumo" class="p-6 space-y-6">
            <div class="premium-card p-10 relative">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <p class="text-zinc-500 text-[10px] font-black uppercase mb-2">Total Disponível</p>
                        <h2 id="saldo-geral" class="text-5xl font-extrabold tracking-tighter">R$ 0,00</h2>
                    </div>
                    <button onclick="togglePrivacidade()" id="btn-privacidade-ui" class="p-3 bg-zinc-900/50 rounded-xl border border-zinc-800 text-[9px] font-black">OCULTAR</button>
                </div>
                
                <div class="grid grid-cols-2 gap-8 pt-8 border-t border-zinc-900">
                    <div>
                        <p class="text-[9px] font-black text-zinc-500 uppercase mb-1">Entradas</p>
                        <p id="perf-entradas" class="text-entrada font-bold text-xl">R$ 0,00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-black text-zinc-500 uppercase mb-1">Saídas</p>
                        <p id="perf-saidas" class="text-saida font-bold text-xl">R$ 0,00</p>
                    </div>
                </div>
            </div>
            
            <div id="movimentacoes-resumo" class="space-y-4"></div>
        </section>

        <section id="aba-insights" class="p-6 space-y-6">
            <div class="premium-card p-8 border-l-8 border-indigo-600">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Comprometimento Futuro</p>
                <h3 id="total-parcelas-futuras" class="text-3xl font-black text-white">R$ 0,00</h3>
                <p class="text-[9px] text-zinc-500 mt-2">Dívidas parceladas para os próximos meses.</p>
            </div>
            
            <div class="flex gap-4">
                <select id="filtro-banco" onchange="render()" class="p-5 rounded-2xl text-[10px] font-bold flex-1"></select>
                <input type="text" id="busca-desc" onkeyup="render()" placeholder="Buscar lançamentos..." class="p-5 rounded-2xl text-[10px] font-bold flex-[2]">
            </div>
            
            <div id="lista-extrato-full" class="space-y-4"></div>
        </section>

        <section id="aba-bancos" class="p-6 space-y-4">
            <div id="lista-bancos" class="space-y-4"></div>
            
            <div class="premium-card p-8 space-y-4 mt-6">
                <p class="text-[10px] font-black text-zinc-500 text-center uppercase tracking-widest">Nova Conta</p>
                
                <input id="nome-banco" type="text" placeholder="Nome" class="w-full p-4 rounded-xl font-bold">
                <input id="saldo-inicial" type="number" placeholder="Saldo R$" class="w-full p-4 rounded-xl font-bold">
                
                <div class="flex items-center justify-between p-2">
                    <span class="text-[10px] font-black text-zinc-500 uppercase">Cor da Instituição</span>
                    <input type="color" id="cor-banco" value="#ffffff" class="h-10 w-full bg-transparent border-0 cursor-pointer">
                </div>
                
                <button onclick="adicionarBanco()" class="w-full bg-white text-black p-4 rounded-xl font-black uppercase text-xs">Vincular</button>
            </div>
        </section>

        <section id="aba-metas" class="p-6 space-y-6">
            <div id="lista-metas" class="space-y-16"></div>
            
            <div class="premium-card p-10 space-y-4 mt-10">
                <p class="text-[10px] font-black text-zinc-500 text-center uppercase tracking-widest">Criar Objetivo</p>
                
                <input id="nome-meta" type="text" placeholder="Nome do Objetivo" class="w-full p-4 rounded-xl font-bold">
                <input id="valor-meta" type="number" placeholder="Alvo Final R$" class="w-full p-4 rounded-xl font-bold">
                
                <button onclick="adicionarMeta()" class="w-full bg-white text-black p-4 rounded-xl font-black uppercase text-xs">Criar Cofre</button>
            </div>
        </section>

        <button onclick="abrirModal()" class="fixed bottom-12 right-8 w-16 h-16 bg-white text-black rounded-3xl shadow-2xl flex items-center justify-center z-50 text-3xl font-black">+</button>
    </div>

    <div id="modal-edit-geral" class="fixed inset-0 bg-black/95 hidden z-[300] flex items-end backdrop-blur-2xl">
        <div class="premium-card w-full rounded-t-[50px] p-10 pb-16 space-y-6">
            <h3 id="edit-titulo" class="text-white font-black text-center uppercase text-xs">Editar</h3>
            
            <input id="edit-nome" type="text" class="w-full p-5 rounded-2xl font-bold">
            <input id="edit-v1" type="number" class="w-full p-5 rounded-2xl font-bold">
            <input id="edit-v2" type="number" class="w-full p-5 rounded-2xl font-bold">
            
            <div id="edit-cor-wrapper" class="flex justify-between items-center p-2">
                <span class="text-[10px] font-black text-zinc-600 uppercase">Cor da Instituição</span>
                <input type="color" id="edit-cor" class="h-10 w-20 bg-transparent border-0">
            </div>
            
            <button onclick="salvarEdicaoGeral()" class="w-full bg-white text-black p-5 rounded-2xl font-black uppercase">Salvar Alterações</button>
            <button onclick="fecharModalEdit()" class="w-full text-zinc-600 font-bold p-2 text-xs uppercase text-center">Cancelar</button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/95 hidden z-[200] flex items-end backdrop-blur-2xl">
        <div class="premium-card w-full rounded-t-[50px] p-10 pb-16 space-y-6">
            <input id="m-desc" type="text" placeholder="Referência (ex: Almoço)" class="w-full p-5 rounded-2xl font-bold">
            
            <div class="relative">
                <input id="m-valor" type="number" oninput="simularImpacto()" step="0.01" inputmode="decimal" placeholder="R$ 0,00" class="w-full p-5 bg-transparent border-b-2 font-black text-5xl text-center outline-none">
                
                <div id="simulador-box" class="hidden p-4 mt-4 bg-indigo-950/20 border border-indigo-900/50 rounded-2xl text-[9px] font-bold text-indigo-400 uppercase tracking-widest text-center"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="m-tipo" class="p-5 rounded-2xl font-black" onchange="atualizarEstiloModal()">
                    <option value="despesa">SAÍDA (-)</option>
                    <option value="receita">ENTRADA (+)</option>
                </select>
                
                <select id="m-parcelas" class="p-5 rounded-2xl font-bold" onchange="simularImpacto()">
                    <option value="1">À vista</option>
                    <option value="2">2x</option>
                    <option value="3">3x</option>
                    <option value="6">6x</option>
                    <option value="12">12x</option>
                </select>
            </div>
            
            <select id="m-banco" class="p-5 rounded-2xl font-bold w-full"></select>
            
            <button id="btn-confirmar" onclick="confirmarLancamento()" class="w-full p-6 rounded-2xl font-black text-lg uppercase transition-all duration-300">Confirmar</button>
            <button onclick="fecharModal()" class="w-full text-zinc-600 font-bold p-2 text-center text-[10px] uppercase">Fechar</button>
        </div>
    </div>

    <div id="modal-aporte" class="fixed inset-0 bg-black/95 hidden z-[200] flex items-end backdrop-blur-2xl">
        <div class="premium-card w-full rounded-t-[50px] p-10 pb-16 space-y-6 text-center">
            <h3 class="text-emerald-500 font-black text-center uppercase text-xs tracking-widest">Aportar no Cofre</h3>
            
            <input id="a-valor" type="number" placeholder="R$ 0,00" class="w-full p-5 bg-transparent border-b-2 border-emerald-500 text-emerald-500 font-black text-5xl text-center outline-none">
            
            <select id="a-origem" class="w-full p-5 rounded-2xl font-bold"></select>
            
            <button onclick="confirmarAporte()" class="w-full bg-emerald-500 text-black p-6 rounded-2xl font-black text-lg uppercase">Guardar Dinheiro</button>
            <button onclick="fecharModalAporte()" class="w-full text-zinc-600 font-bold p-2 text-[10px] uppercase">Voltar</button>
        </div>
    </div>

    <script>
        // Variáveis Globais
        let u = ""; 
        let idMetaS = null; 
        let editType = ""; 
        let editIdx = null; 
        let privacidade = false;
        
        // Inicialização do Banco de Dados
        let db = JSON.parse(localStorage.getItem('guima_v25_expanded_real'));
        if (!db) {
            db = {};
        }

        // FUNÇÃO: Navegação entre abas
        function mudarAba(id) {
            const abas = ['resumo', 'insights', 'bancos', 'metas'];
            
            for (let i = 0; i < abas.length; i++) {
                let aba = abas[i];
                document.getElementById('aba-' + aba).style.display = 'none';
                document.getElementById('btn-' + aba).classList.remove('tab-active');
            }
            
            document.getElementById('aba-' + id).style.display = 'block';
            document.getElementById('btn-' + id).classList.add('tab-active');
            
            render();
        }

        // FUNÇÃO: Sistema de Login
        function fazerLogin() {
            const inputNome = document.getElementById('user-name');
            const rawName = inputNome.value.trim();
            
            if (rawName === "") {
                return;
            }
            
            u = rawName.toLowerCase();
            
            if (!db[u]) {
                db[u] = { 
                    bancos: [], 
                    historico: [], 
                    metas: [] 
                };
            }
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').classList.remove('hidden');
            
            mudarAba('resumo');
        }

        // FUNÇÃO: Alternar Privacidade
        function togglePrivacidade() { 
            privacidade = !privacidade; 
            
            const btnUi = document.getElementById('btn-privacidade-ui');
            
            if (privacidade) {
                btnUi.innerText = "MOSTRAR";
            } else {
                btnUi.innerText = "OCULTAR";
            }
            
            render(); 
        }

        // FUNÇÃO: Atualizar Cores do Modal Dinamicamente
        function atualizarEstiloModal() {
            const selectTipo = document.getElementById('m-tipo');
            const tipoSelecionado = selectTipo.value;
            
            const inputValor = document.getElementById('m-valor');
            const btnConfirmar = document.getElementById('btn-confirmar');

            if (tipoSelecionado === 'receita') {
                inputValor.style.color = '#10b981';
                inputValor.style.borderBottomColor = '#10b981';
                
                selectTipo.style.color = '#10b981';
                selectTipo.style.borderColor = '#10b981';
                
                btnConfirmar.style.backgroundColor = '#10b981';
                btnConfirmar.style.color = '#000000';
            } else {
                inputValor.style.color = '#ef4444';
                inputValor.style.borderBottomColor = '#ef4444';
                
                selectTipo.style.color = '#ef4444';
                selectTipo.style.borderColor = '#ef4444';
                
                btnConfirmar.style.backgroundColor = '#ffffff';
                btnConfirmar.style.color = '#000000';
            }
            
            simularImpacto();
        }

        // FUNÇÃO: Simular Impacto Financeiro
        function simularImpacto() {
            const inputValor = document.getElementById('m-valor');
            const valor = parseFloat(inputValor.value) || 0;
            
            const selectParcelas = document.getElementById('m-parcelas');
            const parcelas = parseInt(selectParcelas.value);
            
            const box = document.getElementById('simulador-box');
            
            if (valor <= 0) {
                box.classList.add('hidden');
                return;
            }
            
            box.classList.remove('hidden');
            
            if (parcelas > 1) {
                const valorParcela = valor / parcelas;
                box.innerText = `Impacto: R$ ${valorParcela.toFixed(2)} por mês durante ${parcelas} meses.`;
            } else {
                box.innerText = `Impacto imediato no saldo da conta.`;
            }
        }

        // FUNÇÃO PRINCIPAL: Renderizar toda a Interface
        function render() {
            const user = db[u]; 
            
            if (!user) {
                return;
            }
            
            const dataHoje = new Date();
            const mesAtual = dataHoje.getMonth(); 
            const anoAtual = dataHoje.getFullYear();

            // Renderizar Saldo Total
            let totalSaldo = 0;
            for (let i = 0; i < user.bancos.length; i++) {
                totalSaldo = totalSaldo + user.bancos[i].saldo;
            }
            
            const elementoSaldo = document.getElementById('saldo-geral');
            elementoSaldo.innerText = `R$ ${totalSaldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            if (privacidade) {
                elementoSaldo.classList.add('hide-val');
            } else {
                elementoSaldo.classList.remove('hide-val');
            }

            // Filtrar Movimentos do Mês Atual
            const movMes = [];
            for (let i = 0; i < user.historico.length; i++) {
                if (user.historico[i].mes === mesAtual && user.historico[i].ano === anoAtual) {
                    movMes.push(user.historico[i]);
                }
            }
            
            // Calcular Ganhos e Gastos
            let totalEntradas = 0;
            let totalSaidas = 0;
            
            for (let i = 0; i < movMes.length; i++) {
                if (movMes[i].tipo === 'receita') {
                    totalEntradas = totalEntradas + movMes[i].valor;
                } else {
                    totalSaidas = totalSaidas + movMes[i].valor;
                }
            }
            
            const displayEntradas = document.getElementById('perf-entradas');
            const displaySaidas = document.getElementById('perf-saidas');
            
            displayEntradas.innerText = `+ R$ ${totalEntradas.toLocaleString('pt-BR')}`;
            displaySaidas.innerText = `- R$ ${totalSaidas.toLocaleString('pt-BR')}`;
            
            if (privacidade) { 
                displayEntradas.classList.add('hide-val'); 
                displaySaidas.classList.add('hide-val'); 
            } else { 
                displayEntradas.classList.remove('hide-val'); 
                displaySaidas.classList.remove('hide-val'); 
            }

            // Calcular Dívidas Futuras (Projeção)
            let dividasFuturas = 0;
            for (let i = 0; i < user.historico.length; i++) {
                let h = user.historico[i];
                if ((h.ano > anoAtual) || (h.ano === anoAtual && h.mes > mesAtual)) {
                    dividasFuturas = dividasFuturas + h.valor;
                }
            }
            
            document.getElementById('total-parcelas-futuras').innerText = `R$ ${dividasFuturas.toLocaleString('pt-BR')}`;

            // Criar Função Auxiliar para Template do Histórico
            function criarCartaoHistorico(h) {
                let badge = "";
                if (h.totalP > 1) {
                    badge = `<span class="bg-parcela">${h.nP}/${h.totalP}</span>`;
                }
                
                let corClasse = "";
                let sinal = "";
                
                if (h.tipo === 'receita') {
                    corClasse = 'text-entrada';
                    sinal = '+';
                } else {
                    corClasse = 'text-saida';
                    sinal = '-';
                }
                
                return `
                <div class="premium-card p-6 border-l-4" style="border-color: ${h.cor}">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-sm font-bold text-white mb-1">${h.desc} ${badge}</p>
                            <p class="text-[9px] font-black text-zinc-600 uppercase">${h.data} • ${h.banco}</p>
                        </div>
                        <span class="font-black text-sm ${corClasse}">
                            ${sinal} R$ ${h.valor.toFixed(2)}
                        </span>
                    </div>
                </div>`;
            }

            // Renderizar Histórico Resumido (Até 5 itens)
            const historicoRecenteHTML = [];
            let count = 0;
            for (let i = 0; i < user.historico.length; i++) {
                if (user.historico[i].mes === mesAtual) {
                    historicoRecenteHTML.push(criarCartaoHistorico(user.historico[i]));
                    count++;
                }
                if (count >= 5) break;
            }
            document.getElementById('movimentacoes-resumo').innerHTML = historicoRecenteHTML.join('');
            
            // Renderizar Extrato Completo com Filtros
            const fBanco = document.getElementById('filtro-banco').value || 'todos';
            const fBusca = (document.getElementById('busca-desc').value || '').toLowerCase();
            
            const extratoFiltradoHTML = [];
            for (let i = 0; i < user.historico.length; i++) {
                let h = user.historico[i];
                let condicaoBanco = (fBanco === 'todos' || h.banco === fBanco);
                let condicaoBusca = h.desc.toLowerCase().includes(fBusca);
                
                if (condicaoBanco && condicaoBusca) {
                    extratoFiltradoHTML.push(criarCartaoHistorico(h));
                }
            }
            document.getElementById('lista-extrato-full').innerHTML = extratoFiltradoHTML.join('');

            // Renderizar Lista de Bancos
            const bancosHTML = [];
            for (let i = 0; i < user.bancos.length; i++) {
                let b = user.bancos[i];
                let hideClass = privacidade ? 'hide-val' : '';
                
                bancosHTML.push(`
                <div class="premium-card p-7 border-l-[14px]" style="border-color: ${b.cor}">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="text-[9px] font-black text-zinc-600 uppercase mb-2 block tracking-widest">${b.nome}</span>
                            <span class="font-black text-2xl text-white ${hideClass}">R$ ${b.saldo.toFixed(2)}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="abrirEdit('banco', ${i})" class="btn-action text-zinc-400 text-xs">✎</button>
                            <button onclick="excluirItem('banco', ${i})" class="btn-action text-rose-900 text-xs">✕</button>
                        </div>
                    </div>
                </div>`);
            }
            document.getElementById('lista-bancos').innerHTML = bancosHTML.join('');

            // Renderizar Lista de Cofres
            const metasHTML = [];
            for (let i = 0; i < user.metas.length; i++) {
                let m = user.metas[i];
                
                let percentualCalculado = (m.atual / m.total) * 100;
                let progresso = Math.min(100, percentualCalculado);
                let concluido = false;
                
                if (progresso >= 100) {
                    concluido = true;
                }
                
                let emoji = concluido ? '🥳' : '🏃‍♂️';
                let corPercentual = concluido ? 'text-emerald-500' : 'text-white';
                
                metasHTML.push(`
                <div class="premium-card p-10 space-y-4">
                    <div class="flex justify-between font-black text-[11px] text-zinc-500 uppercase">
                        <span>${m.nome}</span>
                        <div class="flex gap-3">
                            <button onclick="abrirEdit('meta', ${i})" class="text-zinc-500">✎</button>
                            <button onclick="excluirItem('meta', ${i})" class="text-rose-950">✕</button>
                            <span class="${corPercentual}">${progresso.toFixed(1)}%</span>
                        </div>
                    </div>
                    <div class="progress-track">
                        <div class="runner" style="left: calc(${progresso}% - 15px)">${emoji}</div>
                        <div class="progress-bar-fintech" style="width: ${progresso}%"></div>
                    </div>
                    <div class="flex justify-between items-center pt-4">
                        <p class="text-[10px] font-black">R$ ${m.atual.toFixed(0)} / ${m.total.toFixed(0)}</p>
                        <button onclick="abrirAporte(${m.id})" class="text-[10px] font-black border-b border-white pb-1">APORTAR</button>
                    </div>
                </div>`);
            }
            document.getElementById('lista-metas').innerHTML = metasHTML.join('');

            // Atualizar Filtros de Banco no Extrato
            let opcoesFiltro = '<option value="todos">Todas as Contas</option>';
            for (let i = 0; i < user.bancos.length; i++) {
                let bancoNome = user.bancos[i].nome;
                opcoesFiltro += `<option value="${bancoNome}">${bancoNome}</option>`;
            }
            
            const selectFiltro = document.getElementById('filtro-banco');
            selectFiltro.innerHTML = opcoesFiltro;
            
            if (fBanco !== 'todos') {
                selectFiltro.value = fBanco;
            }
        }

        // FUNÇÃO: Abrir Modal de Edição Universal
        function abrirEdit(tipo, index) {
            editType = tipo; 
            editIdx = index;
            
            const tituloModal = document.getElementById('edit-titulo');
            const inputNome = document.getElementById('edit-nome');
            const inputV1 = document.getElementById('edit-v1');
            const inputV2 = document.getElementById('edit-v2');
            const colorWrapper = document.getElementById('edit-cor-wrapper');
            const inputColor = document.getElementById('edit-cor');
            
            let item;
            
            if (tipo === 'banco') {
                item = db[u].bancos[index];
                tituloModal.innerText = "Editar Conta";
                inputNome.value = item.nome;
                inputV1.value = item.saldo;
                inputV2.style.display = 'none';
                colorWrapper.style.display = 'flex';
                inputColor.value = item.cor;
            } else {
                item = db[u].metas[index];
                tituloModal.innerText = "Editar Cofre";
                inputNome.value = item.nome;
                inputV1.value = item.atual;
                inputV2.value = item.total;
                inputV2.style.display = 'block';
                colorWrapper.style.display = 'none';
            }
            
            document.getElementById('modal-edit-geral').classList.remove('hidden');
        }

        // FUNÇÃO: Salvar Edição
        function salvarEdicaoGeral() {
            const inputNome = document.getElementById('edit-nome').value;
            
            if (editType === 'banco') {
                let itemBanco = db[u].bancos[editIdx];
                itemBanco.nome = inputNome;
                itemBanco.saldo = parseFloat(document.getElementById('edit-v1').value);
                itemBanco.cor = document.getElementById('edit-cor').value;
            } else {
                let itemMeta = db[u].metas[editIdx];
                itemMeta.nome = inputNome;
                itemMeta.atual = parseFloat(document.getElementById('edit-v1').value);
                itemMeta.total = parseFloat(document.getElementById('edit-v2').value);
            }
            
            fecharModalEdit(); 
            salvar();
        }

        // FUNÇÃO: Excluir Item
        function excluirItem(tipo, index) { 
            const resposta = confirm("Remover item permanentemente?");
            
            if (resposta) { 
                if (tipo === 'banco') {
                    db[u].bancos.splice(index, 1);
                } else {
                    db[u].metas.splice(index, 1);
                }
                salvar(); 
            } 
        }

        function fecharModalEdit() { 
            document.getElementById('modal-edit-geral').classList.add('hidden'); 
        }

        // FUNÇÃO: Criar Nova Conta
        function adicionarBanco() {
            const inputNome = document.getElementById('nome-banco');
            const inputSaldo = document.getElementById('saldo-inicial');
            const inputCor = document.getElementById('cor-banco');
            
            const nome = inputNome.value;
            const saldo = parseFloat(inputSaldo.value);
            const cor = inputCor.value;
            
            if (nome === "" || isNaN(saldo)) {
                return;
            }
            
            db[u].bancos.push({ 
                nome: nome, 
                saldo: saldo, 
                cor: cor 
            });
            
            inputNome.value = ""; 
            inputSaldo.value = "";
            
            salvar();
        }

        // FUNÇÃO: Criar Nova Meta
        function adicionarMeta() {
            const inputNome = document.getElementById('nome-meta');
            const inputValor = document.getElementById('valor-meta');
            
            const nome = inputNome.value;
            const valorTotal = parseFloat(inputValor.value);
            
            if (nome === "" || isNaN(valorTotal)) {
                return;
            }
            
            db[u].metas.push({ 
                id: Date.now(), 
                nome: nome, 
                total: valorTotal, 
                atual: 0 
            });
            
            inputNome.value = ""; 
            inputValor.value = "";
            
            salvar();
        }

        // FUNÇÃO: Confirmar Nova Transação (Lançamento ou Parcelamento)
        function confirmarLancamento() {
            const inputDesc = document.getElementById('m-desc');
            const inputValor = document.getElementById('m-valor');
            const selectTipo = document.getElementById('m-tipo');
            const selectParcelas = document.getElementById('m-parcelas');
            const selectBanco = document.getElementById('m-banco');
            
            const desc = inputDesc.value;
            const valorTotal = parseFloat(inputValor.value);
            const tipo = selectTipo.value;
            const parcelas = parseInt(selectParcelas.value);
            const nomeBanco = selectBanco.value;
            
            let bancoDestino = null;
            for (let i = 0; i < db[u].bancos.length; i++) {
                if (db[u].bancos[i].nome === nomeBanco) {
                    bancoDestino = db[u].bancos[i];
                    break;
                }
            }
            
            if (bancoDestino === null || isNaN(valorTotal) || desc === "") { 
                alert("Por favor, preencha todos os campos do lançamento.");
                return; 
            }
            
            const valorDaParcela = valorTotal / parcelas; 
            const dataDeHoje = new Date();
            
            // Loop de criação de parcelas
            for (let i = 0; i < parcelas; i++) {
                let dataDaParcela = new Date(
                    dataDeHoje.getFullYear(), 
                    dataDeHoje.getMonth() + i, 
                    dataDeHoje.getDate()
                );
                
                db[u].historico.unshift({ 
                    desc: desc, 
                    valor: valorDaParcela, 
                    tipo: tipo, 
                    banco: nomeBanco, 
                    cor: bancoDestino.cor, 
                    data: dataDaParcela.toLocaleDateString('pt-BR'), 
                    mes: dataDaParcela.getMonth(), 
                    ano: dataDaParcela.getFullYear(), 
                    nP: i + 1, 
                    totalP: parcelas 
                });
                
                // Aplica impacto no saldo bancário apenas para a primeira parcela (mês atual)
                if (i === 0) { 
                    if (tipo === 'receita') {
                        bancoDestino.saldo = bancoDestino.saldo + valorDaParcela;
                    } else {
                        bancoDestino.saldo = bancoDestino.saldo - valorDaParcela;
                    }
                }
            }
            
            // Limpa o formulário do modal
            inputDesc.value = ""; 
            inputValor.value = "";
            selectParcelas.value = "1";
            selectTipo.value = "despesa";
            
            fecharModal(); 
            salvar();
        }

        // FUNÇÃO: Abrir Modal Lançamento
        function abrirModal() { 
            let opcoesBancos = '';
            
            for (let i = 0; i < db[u].bancos.length; i++) {
                let nomeBanco = db[u].bancos[i].nome;
                opcoesBancos += `<option value="${nomeBanco}">${nomeBanco}</option>`; 
            }
            
            document.getElementById('m-banco').innerHTML = opcoesBancos; 
            
            // Limpa campos residuais antes de abrir
            document.getElementById('m-valor').value = "";
            document.getElementById('m-desc').value = "";
            document.getElementById('m-parcelas').value = "1";
            document.getElementById('m-tipo').value = "despesa";
            
            document.getElementById('modal').classList.remove('hidden'); 
            
            // Aplica a cor correta inicial
            atualizarEstiloModal(); 
        }

        function fecharModal() { 
            document.getElementById('modal').classList.add('hidden'); 
        }

        // FUNÇÃO: Abrir Modal de Aporte
        function abrirAporte(idDoCofre) { 
            idMetaS = idDoCofre; 
            
            let opcoesBancos = '';
            for (let i = 0; i < db[u].bancos.length; i++) {
                let nomeBanco = db[u].bancos[i].nome;
                opcoesBancos += `<option value="${nomeBanco}">${nomeBanco}</option>`; 
            }
            
            document.getElementById('a-origem').innerHTML = opcoesBancos; 
            document.getElementById('modal-aporte').classList.remove('hidden'); 
        }

        function fecharModalAporte() { 
            document.getElementById('modal-aporte').classList.add('hidden'); 
        }

        // FUNÇÃO: Efetivar Aporte
        function confirmarAporte() {
            const inputAporteValor = document.getElementById('a-valor');
            const valor = parseFloat(inputAporteValor.value); 
            
            const nomeBancoOrigem = document.getElementById('a-origem').value;
            
            let bancoOrigem = null;
            for (let i = 0; i < db[u].bancos.length; i++) {
                if (db[u].bancos[i].nome === nomeBancoOrigem) {
                    bancoOrigem = db[u].bancos[i];
                    break;
                }
            }
            
            let cofreDestino = null;
            for (let i = 0; i < db[u].metas.length; i++) {
                if (db[u].metas[i].id === idMetaS) {
                    cofreDestino = db[u].metas[i];
                    break;
                }
            }
            
            if (bancoOrigem === null || cofreDestino === null || isNaN(valor)) {
                return;
            }
            
            if (bancoOrigem.saldo < valor) { 
                alert("Saldo insuficiente na conta selecionada."); 
                return; 
            }

            bancoOrigem.saldo = bancoOrigem.saldo - valor; 
            cofreDestino.atual = cofreDestino.atual + valor; 
            
            const dataHoje = new Date();
            
            db[u].historico.unshift({ 
                desc: `Aporte: ${cofreDestino.nome}`, 
                valor: valor, 
                tipo: 'despesa', 
                banco: bancoOrigem.nome, 
                cor: '#ffffff', 
                data: dataHoje.toLocaleDateString('pt-BR'), 
                mes: dataHoje.getMonth(), 
                ano: dataHoje.getFullYear(), 
                nP: 1, 
                totalP: 1 
            });
            
            inputAporteValor.value = ""; 
            
            fecharModalAporte(); 
            salvar();
        }

        // FUNÇÃO: Salvar Banco de Dados
        function salvar() { 
            localStorage.setItem('guima_v25_expanded_real', JSON.stringify(db)); 
            render(); 
        }
    </script>
</body>
</html>
